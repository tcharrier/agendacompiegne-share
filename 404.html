<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1E5BB8">
  <title>Ouverture d'Agenda Compiègne…</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(180deg, #CED9E6 0%, #E2E8EF 100%);
      color: #15202B;
      max-width: 480px;
      margin: 0 auto;
      padding: 80px 24px;
      min-height: 100vh;
      line-height: 1.55;
      text-align: center;
    }
    h1 {
      color: #1E5BB8;
      font-size: 1.4rem;
      letter-spacing: -0.3px;
      margin: 0 0 12px;
    }
    .spinner {
      display: inline-block;
      width: 36px;
      height: 36px;
      border: 3px solid #E3E6EB;
      border-top-color: #1E5BB8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 24px 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #5A6573; }
    .note { color: #8A93A1; font-size: 0.85rem; margin-top: 32px; }
    a { color: #1E5BB8; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Ouverture de l'événement…</h1>
  <div class="spinner"></div>
  <p>Si l'application n'est pas installée, vous serez redirigé vers le Play Store dans un instant.</p>
  <p class="note">
    Si rien ne se passe :
    <a id="play-link" href="https://play.google.com/store/apps/details?id=app.agendacompiegne.agendacompiegne">
      installer Agenda Compiègne
    </a>
  </p>

  <script>
    (function () {
      var PLAY_STORE = 'https://play.google.com/store/apps/details?id=app.agendacompiegne.agendacompiegne';

      // 1. Try to extract an event id from the requested URL.
      //    URL pattern: /agendacompiegne-share/event/{id}
      var match = location.pathname.match(/\/event\/(.+?)\/?$/);
      if (!match) {
        // Not an /event URL → just go to Play Store after a short delay so
        // the spinner doesn't flash.
        setTimeout(function () { window.location.replace(PLAY_STORE); }, 600);
        return;
      }
      var eventId = match[1];

      // 2. Try to open the app via custom scheme.
      //    If the app is installed, the browser navigates away.
      //    Otherwise the timeout fires and we redirect to Play Store.
      var customScheme = 'agendacompiegne://event/' + eventId;
      var fallbackTimer = setTimeout(function () {
        window.location.replace(PLAY_STORE);
      }, 1500);

      // 3. If the document becomes hidden (= app took over), cancel the
      //    fallback so we don't redirect after the user already reached
      //    the app.
      document.addEventListener('visibilitychange', function () {
        if (document.hidden) clearTimeout(fallbackTimer);
      });

      window.location.replace(customScheme);
    })();
  </script>
</body>
</html>
