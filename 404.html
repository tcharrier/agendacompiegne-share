<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1E5BB8">
  <title>Ouverture d'Agenda ARC…</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(180deg, #CED9E6 0%, #E2E8EF 100%);
      color: #15202B;
      max-width: 480px;
      margin: 0 auto;
      padding: 60px 24px;
      min-height: 100vh;
      line-height: 1.55;
      text-align: center;
    }
    h1 {
      color: #1E5BB8;
      font-size: 1.4rem;
      letter-spacing: -0.3px;
      margin: 0 0 12px;
    }
    .spinner {
      display: inline-block;
      width: 36px;
      height: 36px;
      border: 3px solid #E3E6EB;
      border-top-color: #1E5BB8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 24px 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #5A6573; }
    .cta {
      display: inline-block;
      background: #1E5BB8;
      color: white;
      padding: 14px 22px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(30, 91, 184, 0.25);
      margin-top: 12px;
    }
    .secondary {
      display: inline-block;
      color: #1E5BB8;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      margin-top: 18px;
    }
    .icon { font-size: 1.4rem; margin-right: 6px; }
    #fallback { display: none; }
    #fallback.show { display: block; }
  </style>
</head>
<body>
  <h1>Ouverture de l'événement…</h1>
  <div class="spinner"></div>
  <p>Si l'application est installée, elle devrait s'ouvrir automatiquement.</p>

  <div id="fallback">
    <p style="margin-top: 32px; font-size: 1rem;">L'application ne s'est pas ouverte ?</p>
    <a class="cta" id="install-link" href="https://play.google.com/store/apps/details?id=app.agendaarc.agendaarc">
      <span class="icon">📲</span>Installer Agenda ARC
    </a>
    <br>
    <a class="secondary" id="retry-link" href="#">Réessayer l'ouverture</a>
  </div>

  <script>
    (function () {
      var PLAY_STORE = 'https://play.google.com/store/apps/details?id=app.agendaarc.agendaarc';

      // Extract the event id from /agendacompiegne-share/event/{id}
      var match = location.pathname.match(/\/event\/(.+?)\/?$/);
      var eventId = match ? match[1] : '';
      var customScheme = eventId
        ? 'agendacompiegne://event/' + eventId
        : 'agendacompiegne://event';

      // Try opening the app via the custom scheme. If it's installed,
      // Android will intercept and the user is moved to the app.
      //
      // CRITICAL: we deliberately DO NOT auto-redirect to the Play Store
      // after a timeout — that pattern, very common in deep-link landing
      // pages, broke us when the page loaded inside Facebook's in-app
      // browser: Facebook's WebView keeps running JavaScript even after
      // the user is moved to our app via the custom scheme, so the
      // `setTimeout(...PLAY_STORE...)` would fire after ~1.5 s and
      // navigate the WebView to the Play Store. Android then opened
      // the Play Store on top of our already-running app, kicking the
      // user out of the event they were viewing.
      //
      // Instead, we attempt the custom scheme right away, and after
      // 2.5 s reveal a manual « Installer Agenda ARC » button so
      // users without the app can still get there — but only if THEY
      // tap the button. Never automatic.
      window.location.replace(customScheme);

      setTimeout(function () {
        var fallback = document.getElementById('fallback');
        if (fallback) fallback.classList.add('show');
      }, 2500);

      // Manual retry — does the same custom scheme dance.
      var retryLink = document.getElementById('retry-link');
      if (retryLink) {
        retryLink.addEventListener('click', function (e) {
          e.preventDefault();
          window.location.replace(customScheme);
        });
      }
    })();
  </script>
</body>
</html>
