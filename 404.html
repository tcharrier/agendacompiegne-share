<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1E5BB8">
  <title>Agenda ARC</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(180deg, #CED9E6 0%, #E2E8EF 100%);
      color: #15202B;
      max-width: 600px;
      margin: 0 auto;
      padding: 60px 24px;
      min-height: 100vh;
      line-height: 1.55;
    }
    h1 {
      color: #1E5BB8;
      font-size: 1.8rem;
      letter-spacing: -0.4px;
      margin: 0 0 8px;
    }
    .lead { color: #5A6573; margin-bottom: 32px; }
    .cta {
      display: inline-block;
      background: #1E5BB8;
      color: white;
      padding: 14px 22px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(30, 91, 184, 0.25);
    }
    .note {
      margin-top: 40px;
      color: #8A93A1;
      font-size: 0.85rem;
    }
    .icon { font-size: 1.4rem; margin-right: 6px; }
  </style>
</head>
<body>
  <h1>📅 Agenda ARC</h1>
  <p class="lead">L'agenda des événements de l'Agglomération de la Région de Compiègne (ARC) — culture, sport, sorties, manifestations.</p>
  <a class="cta" href="https://play.google.com/store/apps/details?id=app.agendaarc.agendaarc">
    <span class="icon">📲</span>Installer sur Android
  </a>
  <p class="note">Application non-officielle &middot; Thomas Charrier</p>
</body>
</html>
